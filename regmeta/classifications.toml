# Classification seed for regmeta.
#
# Each [[classification]] entry declares one normalized code system
# (SUN2000, SSYK2012, SNI2007, ...) and lists the raw
# `variable_instance.vardemangdsversion` strings that map to it.
#
# Matching is exact string equality against variable_instance rows during
# `regmeta maintain build-db`. Trailing / leading whitespace is preserved
# verbatim — SCB's export contains many labels with stray whitespace, and
# `get values` already exposes the raw string. Keep what you see here.
#
# Optional `valid_codes_file` points to a CSV under
# regmeta/input_data/classifications/ that lists the canonical (officially
# published) codes for the classification. Each `classification_code` row is
# then marked `is_valid=1` if its vardekod is in the CSV, else `is_valid=0`.
# Codes that appear in the CSV but never in observed data are still inserted
# as canonical-but-unobserved (queryable, no `cvid_value_code` linkage).
# Without the field, all codes for the classification carry `is_valid=NULL`
# (validity unknown).
#
# Build-time invariants (violations fail the build loudly):
#   - Every string listed under `vardemangdsversion` must match >= 1 instance
#   - Every classification must resolve to >= 1 instance
#   - Every classification must resolve to >= 1 distinct value code
#   - A given `vardemangdsversion` string may belong to at most one classification
#   - Every `supersedes` reference must resolve to a declared short_name
#   - Every `valid_codes_file` must resolve to an existing CSV with header
#     `vardekod,vardebenamning` and at least one row
#
# To enumerate candidates from the live data:
#   SELECT vardemangdsversion, COUNT(*) FROM variable_instance
#   WHERE vardemangdsversion IS NOT NULL AND vardemangdsversion != ''
#   GROUP BY vardemangdsversion ORDER BY 2 DESC;
#
# Scope of this seed: well-known SCB classifications. Socialstyrelsen
# classifications (ICD, KVÅ, ATC, ...) live in a separate branch.

# ---------------------------------------------------------------------------
# Education — Svensk utbildningsnomenklatur (SUN)
# ---------------------------------------------------------------------------

[[classification]]
short_name = "SUN1996"
name = "Svensk utbildningsnomenklatur 1996"
name_en = "Swedish Standard Classification of Education 1996"
publisher = "SCB"
version = "1996"
valid_from = 1996
valid_to = 1999
url = "https://www.scb.se/dokumentation/klassifikationer-och-standarder/svensk-utbildningsnomenklatur-sun/"
vardemangdsversion = [
  "SUN 1996",
  "SUN 1996, 5 positioner, brutto",
]

# SUN2000 has three orthogonal dimensions, each with its own code space:
#   - Utbildningsnivå       → 3-digit numeric education level
#   - Utbildningsinriktning → 3-digit numeric field of study
#   - Utbildningsgrupper    → 3-character alphanumeric standardized groups
# A code like "520" appears in both Nivå ("Övrig eftergymnasial utbildning,
# 2 år") and Inriktning ("Teknik och teknisk industri, allmän utbildning"),
# so they must be separate classifications.
#
# The supersedes chain runs only on the Nivå axis since SUN1996 was a single
# combined level+direction system (5-digit codes) and "level" is the most
# common interpretation.

[[classification]]
short_name = "SUN2000-NIVA"
name = "Svensk utbildningsnomenklatur 2000 — Utbildningsnivå"
name_en = "Swedish Standard Classification of Education 2000 — Level"
publisher = "SCB"
version = "2000"
valid_from = 2000
valid_to = 2019
url = "https://www.scb.se/dokumentation/klassifikationer-och-standarder/svensk-utbildningsnomenklatur-sun/"
supersedes = "SUN1996"
valid_codes_file = "sun2000-niva.csv"
vardemangdsversion = [
  "SUN 2000 - Utbildningsnivå",
  "Utbildningsnivå (SUN 2000)  ",
  "SUN2000Niva",
]

[[classification]]
short_name = "SUN2000-INRIKTNING"
name = "Svensk utbildningsnomenklatur 2000 — Utbildningsinriktning"
name_en = "Swedish Standard Classification of Education 2000 — Field of Study"
publisher = "SCB"
version = "2000"
valid_from = 2000
valid_to = 2019
url = "https://www.scb.se/dokumentation/klassifikationer-och-standarder/svensk-utbildningsnomenklatur-sun/"
