name: Publish mock-data-wizard to PyPI

on:
  release:
    types: [published]

jobs:
  ci:
    if: startsWith(github.event.release.tag_name, 'mock_data_wizard/v')
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0

      # mock-data-wizard ships no release assets, so this step just confirms
      # the CLI entry point is wired correctly before publishing.
      - name: Smoke test CLI
        run: |
          uv sync --frozen
          uv run mock-data-wizard --help > /dev/null

      - run: uv build mock_data_wizard/ --out-dir dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
